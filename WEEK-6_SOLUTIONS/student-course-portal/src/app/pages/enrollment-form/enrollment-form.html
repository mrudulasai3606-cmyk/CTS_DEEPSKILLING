<div class="form-container">
  <h2>Student Course Enrollment Request</h2>

  <div *ngIf="submitted" class="alert-success">
    Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" novalidate>
    
    <!-- 1. Student Name -->
    <div class="form-group">
      <label for="studentName">Student Name *</label>
      <input 
        type="text" 
        id="studentName" 
        name="studentName" 
        [(ngModel)]="studentName" 
        #nameCtrl="ngModel"
        required 
        minlength="3" 
        class="form-control" />
      
      <div *ngIf="nameCtrl.touched && nameCtrl.invalid" class="error-text">
        <small *ngIf="nameCtrl.errors?.['required']">Name is required.</small>
        <small *ngIf="nameCtrl.errors?.['minlength']">Name must be at least 3 characters long.</small>
      </div>
    </div>

    <!-- 2. Student Email -->
    <div class="form-group">
      <label for="studentEmail">Student Email *</label>
      <input 
        type="email" 
        id="studentEmail" 
        name="studentEmail" 
        [(ngModel)]="studentEmail" 
        #emailCtrl="ngModel"
        required 
        email 
        class="form-control" />
      
      <div *ngIf="emailCtrl.touched && emailCtrl.invalid" class="error-text">
        <small *ngIf="emailCtrl.errors?.['required']">Email is required.</small>
        <small *ngIf="emailCtrl.errors?.['email']">Please enter a valid email address.</small>
      </div>
    </div>

    <!-- 3. Course ID -->
    <div class="form-group">
      <label for="courseId">Course ID *</label>
      <input 
        type="number" 
        id="courseId" 
        name="courseId" 
        [(ngModel)]="courseId" 
        #courseCtrl="ngModel"
        required 
        class="form-control" />
      
      <div *ngIf="courseCtrl.touched && courseCtrl.invalid" class="error-text">
        <small *ngIf="courseCtrl.errors?.['required']">Course ID is required.</small>
      </div>
    </div>

    <!-- 4. Preferred Semester -->
    <div class="form-group">
      <label for="preferredSemester">Preferred Semester</label>
      <select 
        id="preferredSemester" 
        name="preferredSemester" 
        [(ngModel)]="preferredSemester" 
        class="form-control">
        <option value="Odd">Odd Semester</option>
        <option value="Even">Even Semester</option>
      </select>
    </div>

    <!-- 5. Agree to Terms -->
    <div class="form-group checkbox-group">
      <input 
        type="checkbox" 
        id="agreeToTerms" 
        name="agreeToTerms" 
        [(ngModel)]="agreeToTerms" 
        #termsCtrl="ngModel"
        required />
      <label for="agreeToTerms">I agree to the enrollment terms and conditions *</label>
    </div>
    <div *ngIf="termsCtrl.touched && termsCtrl.invalid" class="error-text">
      <small>You must accept the terms to proceed.</small>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid" class="btn-submit">Submit Request</button>
      <button type="button" (click)="onReset(enrollForm)" class="btn-reset">Reset</button>
    </div>

  </form>
</div>
